<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Inventory Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Product Inventory Dashboard</h1>
    </header>

    <!-- Controls -->
    <section id="controls">
        <input type="text" id="searchInput" placeholder="Search product...">

        <select id="categoryFilter">
            <option value="all">All Categories</option>
        </select>

        <select id="stockFilter">
            <option value="all">All Stock</option>
            <option value="low">Low Stock (&lt;5)</option>
        </select>

        <select id="sortOption">
            <option value="default">Sort By</option>
            <option value="lowHigh">Price Low to High</option>
            <option value="highLow">Price High to Low</option>
            <option value="az">A-Z</option>
            <option value="za">Z-A</option>
        </select>
    </section>

    <!-- Analytics -->
    <section id="analytics">
        <div>Total Products: <span id="totalProducts">0</span></div>
        <div>Total Value: ₹<span id="totalValue">0</span></div>
        <div>Out of Stock: <span id="outOfStock">0</span></div>
    </section>

    <!-- Loading -->
    <div id="loading" class="spinner"></div>

    <!-- Product grid -->
    <section id="productGrid"></section>

    <!-- Add product form-->
    <section id="formSection">
        <h2>Add Product</h2>

        <input type="text" id="name" placeholder="Product Name">
        <input type="number" id="price" placeholder="Price">
        <input type="number" id="stock" placeholder="Stock">

        <select id="category">
            <option value="">Select Category</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="accessories">Accessories</option>
        </select>

        <button id="addBtn">Add Product</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
